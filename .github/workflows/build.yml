name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: 🐍 Set up a Perfect Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip wget autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          
          pip install buildozer==1.5.0 cython==0.29.36 virtualenv==20.24.0

      - name: ☁️ Install Android SDK and NDK
        run: |
          set -e
          export SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT"
          cd "$SDK_ROOT"

          echo "Downloading Android SDK command-line tools..."
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip

          mkdir -p "$SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/" || true

          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          # Accept licenses
          yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses || true

          # Install required SDK components
          sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.0"

          # Download and install NDK
          echo "Downloading Android NDK..."
          wget -q https://dl.google.com/android/repository/android-ndk-r23c-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip
          mv android-ndk-r23c "$SDK_ROOT/ndk/23.1.7779620"

      - name: 🚀 Build the App
        run: |
          buildozer android debug
        env:
          BUILDOZER_LOG_LEVEL: 2
          ANDROID_SDK_ROOT: ${{ format('{0}/.buildozer/android/platform/android-sdk', env.HOME) }}
          ANDROID_HOME: ${{ format('{0}/.buildozer/android/platform/android-sdk', env.HOME) }}
          ANDROID_NDK_ROOT: ${{ format('{0}/.buildozer/android/platform/android-sdk/ndk/23.1.7779620', env.HOME) }}

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: TIC-TAC-TOE
          path: bin/*.apk
          retention-days: 30
