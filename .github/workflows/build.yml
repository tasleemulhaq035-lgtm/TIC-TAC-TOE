name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python Dependencies (THE BUG FIX)
        run: |
          # Pinning Cython to 0.29.33 fixes the Kivy crash!
          pip install --user buildozer Cython==0.29.33 virtualenv

      - name: Build with Buildozer
        # Using the community-maintained action that handles licenses perfectly
        uses: OzakIOne/buildozer-action@v2
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NEON_XO_APK
          path: bin/*.apk
